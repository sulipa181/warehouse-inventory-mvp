services:
  - type: web
    name: warehouse-inventory-mvp
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: warehouse-inventory-data
      mountPath: /var/data
      sizeGB: 1
